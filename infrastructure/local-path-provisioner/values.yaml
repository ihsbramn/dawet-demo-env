# =============================================================================
# Local Path Provisioner - Helm Values
# =============================================================================
# WARNING: Non-Production Storage Only
# Not suitable for Production - No HA, No Replication
# =============================================================================

storageClass:
  name: local-path
  defaultClass: true
  reclaimPolicy: Delete

nodePathMap:
  - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
    paths:
      - /opt/local-path-provisioner

# Resource limits
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi
