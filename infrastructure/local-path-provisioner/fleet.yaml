#  =============================================================================
# Local Path Provisioner - Fleet Bundle (Demo)
#  =============================================================================
# Step 2: Storage Provisioner for local local-path (Required for PVCs)
#  =============================================================================

# This bundle uses the official raw manifest (local-path-storage.yaml)
# It's lighter and more reliable than a Helm chart for 8GB RAM Mac.

dependsOn:
 - selector:
     matchLabels:
       bundle: namespaces

targetCustomizations:
 - name: dev
   clusterSelector:
     matchLabels:
       env: dev

labels:
 bundle: local-path-provisioner
