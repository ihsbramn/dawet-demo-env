# =============================================================================
# MinIO Object Storage - Fleet Bundle (Demo)
# =============================================================================
# S3-compatible storage for Loki, Mimir, Tempo, and Dify
# =============================================================================

defaultNamespace: minio-system

helm:
  repo: https://charts.min.io
  chart: minio
  version: 5.2.0
  releaseName: minio
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: local-path-provisioner

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev
    helm:
      valuesFiles:
        - values.yaml
        - overlays/dev-values.yaml

labels:
  bundle: minio
