# =============================================================================
# Redis - Fleet Bundle (Demo)
# =============================================================================
# Step 4: Required by Dify, Milvus, n8n
# =============================================================================

defaultNamespace: redis-system

helm:
  repo: https://charts.bitnami.com/bitnami/
  chart: redis
  version: 19.6.0
  releaseName: redis
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: postgres-cluster

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: redis
