# =============================================================================
# PostgreSQL - n8n Workflow Database (Demo)
# =============================================================================
global:
  postgresql:
    auth:
      postgresPassword: postgres-admin-123
      username: n8n
      password: n8n-db-123
      database: n8n_db

primary:
  persistence:
    enabled: true
    storageClass: local-path
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  initdb:
    scripts:
      init.sql: |
        CREATE DATABASE n8n_db;
        GRANT ALL PRIVILEGES ON DATABASE n8n_db TO n8n;

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    labels:
      release: grafana
