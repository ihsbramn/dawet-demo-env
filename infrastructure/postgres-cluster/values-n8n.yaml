# =============================================================================
# PostgreSQL - n8n Database (Demo)
# =============================================================================
auth:
  postgresPassword: postgres-admin-123
  username: n8n
  password: n8n-db-123
  database: n8n_db

primary:
  persistence:
    enabled: true
    storageClass: hostpath
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

metrics:
  enabled: false
