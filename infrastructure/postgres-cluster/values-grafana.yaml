# =============================================================================
# PostgreSQL - Grafana Database (Demo)
# =============================================================================
auth:
  postgresPassword: postgres-admin-123
  username: grafana
  password: grafana-db-123
  database: grafana_db

primary:
  persistence:
    enabled: true
    storageClass: hostpath
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

metrics:
  enabled: false
