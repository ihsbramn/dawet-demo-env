# =============================================================================
# PostgreSQL Cluster - Fleet Bundle (Demo)
# =============================================================================
# 3 PostgreSQL instances: grafana_db, milvus_meta, n8n_db
# =============================================================================

defaultNamespace: postgres-system

helm:
  repo: https://charts.bitnami.com/bitnami
  chart: postgresql
  version: 15.5.0
  releaseName: postgres-grafana
  valuesFiles:
    - values-grafana.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: local-path-provisioner

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: postgres-cluster
