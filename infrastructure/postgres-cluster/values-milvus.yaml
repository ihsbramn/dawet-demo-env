# =============================================================================
# PostgreSQL - Milvus Metadata (Demo)
# =============================================================================
auth:
  postgresPassword: postgres-admin-123
  username: milvus
  password: milvus-db-123
  database: milvus_meta

primary:
  persistence:
    enabled: true
    storageClass: hostpath
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

metrics:
  enabled: false
