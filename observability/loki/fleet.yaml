# =============================================================================
# Loki (Logs) - Fleet Bundle (Demo)
# =============================================================================
# Step 9: Log aggregation
# =============================================================================

defaultNamespace: observability

helm:
  repo: https://grafana.github.io/helm-charts/
  chart: loki
  version: 6.55.0
  releaseName: loki
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: mimir

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: loki
