# =============================================================================
# Loki - Helm Values (Demo)
# =============================================================================
# Log Storage | MinIO Backend | SingleBinary mode
# =============================================================================

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    s3:
      endpoint: minio.minio-system.svc:9000
      bucketnames: loki-data
      access_key_id: minio-admin
      secret_access_key: minio-secret-123
      insecure: true
      s3ForcePathStyle: true
  limits_config:
    retention_period: 168h  # 7 days for demo
    allow_structured_metadata: true

singleBinary:
  replicas: 1
  persistence:
    storageClass: local-path
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

gateway:
  enabled: true
  replicas: 1

monitoring:
  serviceMonitor:
    enabled: false
    labels:
      release: grafana
