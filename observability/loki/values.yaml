# =============================================================================
# Loki (Monolithic) - Helm Values (Demo)
# =============================================================================
# Ultra-lightweight: Single Binary mode (8GB RAM optimization)
# =============================================================================

loki:
  deploymentMode: SingleBinary
  
  auth_enabled: false
  
  commonConfig:
    replication_factor: 1
    
  storage:
    type: s3
    s3:
      endpoint: minio.minio-system.svc:9000
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
        admin: loki-admin
      accessKeyId: minio-admin
      secretAccessKey: minio-secret-123
      s3ForcePathStyle: true
      insecure: true

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  persistence:
    enabled: true
    storageClass: local-path
    size: 2Gi

# Disable all distributed components
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable service monitor
monitoring:
  serviceMonitor:
    enabled: false
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
