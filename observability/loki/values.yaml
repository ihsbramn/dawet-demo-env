# =============================================================================
# Loki (Monolithic) - Helm Values (Demo)
# =============================================================================
# Ultra-lightweight: Single Binary mode (8GB RAM optimization)
# =============================================================================
deploymentMode: SingleBinary

loki:
  # auth_enabled: false — intentional for demo simplicity.
  # Alloy sends tenant_id: dawet but Loki ignores it in single-tenant mode.
  auth_enabled: false
  useTestSchema: false

  # 7-day log retention
  limits_config:
    retention_period: 168h

  compactor:
    retention_enabled: true
    working_directory: /data/loki/compactor
    shared_store: filesystem
  
  commonConfig:
    replication_factor: 1
    
  storage:
    type: filesystem
    
  storage_config:
    filesystem:
      directory: /data/loki/chunks
    boltdb_shipper:
      active_index_directory: /data/loki/index
      cache_location: /data/loki/cache
      resync_interval: 5s
      shared_store: filesystem
      
  schemaConfig:
    configs:
      - from: 2026-03-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  persistence:
    enabled: true
    storageClass: local-path
    size: 2Gi

# Disable all distributed components
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable service monitor
monitoring:
  serviceMonitor:
    enabled: false
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
