# =============================================================================
# Prometheus (Mimir Substitute) - Helm Values (Demo)
# =============================================================================
# Ultra-lightweight Prometheus for 8GB RAM Mac
# =============================================================================

alertmanager:
  enabled: false

server:
  replicaCount: 1
  retention: 7d
  persistentVolume:
    size: 2Gi
    storageClass: hostpath
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Minimal set of exporters for demo
prometheus-pushgateway:
  enabled: false

prometheus-node-exporter:
  enabled: false

kube-state-metrics:
  enabled: false

# Configure OTLP/Remote Write compatibility
extraArgs:
  enable-feature: otlp-write-receiver
