# =============================================================================
# Kube Prometheus Stack - Helm Values (Demo)
# =============================================================================
# Lightweight Prometheus-only backend for demo cluster (8GB RAM)
# Alloy handles all scraping + PII masking, then remote_writes here
# =============================================================================

# Disable Grafana (separate bundle)
grafana:
  enabled: false

# Disable Alertmanager for demo simplicity
alertmanager:
  enabled: false

# Disable node exporter (Alloy scrapes nodes)
nodeExporter:
  enabled: false

# Disable kube-state-metrics (Alloy scrapes pods/nodes directly)
kubeStateMetrics:
  enabled: false

# Prometheus configuration
prometheus:
  prometheusSpec:
    # 7-day retention for monitoring demo window
    retention: 7d
    retentionSize: ""

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # Enable remote_write receiver so Alloy can push metrics to Prometheus
    additionalArgs:
      - name: enable-feature
        value: remote-write-receiver

    # Don't scrape everything by default — Alloy is the collector
    # Only pick up ServiceMonitors in the observability namespace
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    podMonitorSelector: {}
    ruleSelector: {}

# Prometheus Operator - minimal footprint
prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
