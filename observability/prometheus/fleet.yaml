#  =============================================================================
# Kube Prometheus Stack (Metrics) - Fleet Bundle (Demo)
#  =============================================================================
# Step 7: Full Kubernetes metrics stack using kube-prometheus-stack
#  =============================================================================

defaultNamespace: observability

helm:
  repo: https://prometheus-community.github.io/helm-charts/
  chart: kube-prometheus-stack
  version: 82.15.1
  releaseName: kube-prometheus-stack
  valuesFiles:
    - values.yaml

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: kube-prometheus-stack
