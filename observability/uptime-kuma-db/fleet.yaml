# =============================================================================
# Uptime Kuma DB - Fleet Bundle (Demo)
# =============================================================================
# Dedicated MySQL for Uptime Kuma
# =============================================================================

defaultNamespace: observability

helm:
  chart: mariadb-25.0.6.tgz
  releaseName: uptime-kuma-db
  valuesFiles:
    - values.yaml

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: uptime-kuma-db
