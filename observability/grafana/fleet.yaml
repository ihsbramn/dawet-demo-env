# =============================================================================
# Grafana - Fleet Bundle (Demo)
# =============================================================================
# Step 9: Dashboards & Alerting
# =============================================================================

defaultNamespace: observability

helm:
  repo: https://grafana.github.io/helm-charts/
  chart: grafana
  version: 8.4.0
  releaseName: grafana
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: alloy

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: grafana
