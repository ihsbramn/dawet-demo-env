# =============================================================================
# Grafana - Helm Values (Demo)
# =============================================================================

replicas: 1

adminUser: admin
adminPassword: admin-demo-123

persistence:
  enabled: true
  storageClassName: local-path
  size: 2Gi

initChownData:
  enabled: true
  image:
    repository: busybox
    tag: 1.37.0

## Database - PostgreSQL
grafana.ini:
  server:
    root_url: "https://grafana.dev.dawet.internal"
  database:
    type: postgres
    host: postgres-grafana-postgresql.postgres-system.svc:5432
    name: grafana_db
    user: admin
    password: admin-db-123
  unified_alerting:
    enabled: true
assertNoLeakedSecrets: false

## Pre-configured Datasources
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus.observability.svc:9090
        access: proxy
        isDefault: true
      - name: Loki
        type: loki
        url: http://loki.observability.svc:3100
        access: proxy
      - name: Tempo
        type: tempo
        url: http://tempo.observability.svc:3200
        access: proxy
        jsonData:
          tracesToLogs:
            datasourceUid: Loki
          serviceMap:
            datasourceUid: Prometheus
          nodeGraph:
            enabled: true

# ... rest remains unchanged or handled by sed
ingress:
  enabled: false

service:
  type: NodePort
  port: 3000
  nodePort: 30300

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

## Dashboard sidecar
sidecar:
  dashboards:
    enabled: true
    searchNamespace: ALL
    label: grafana_dashboard
  datasources:
    enabled: true
