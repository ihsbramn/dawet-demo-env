# =============================================================================
# Grafana - Helm Values (Demo)
# =============================================================================

replicas: 1

adminUser: admin
adminPassword: admin-demo-123

persistence:
  enabled: false
  storageClassName: local-path
  size: 2Gi

initChownData:
  enabled: false
  image:
    repository: busybox
    tag: 1.37.0
  securityContext:
    runAsUser: 0
    runAsNonRoot: false
    allowPrivilegeEscalation: true

# Grafana runs as uid 472 — fsGroup ensures the PV dir is group-writable
securityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

## Database - PostgreSQL
grafana.ini:
  server:
    root_url: "https://grafana.dev.dawet.internal"
  database:
    type: postgres
    host: postgres-grafana-postgresql.postgres-system.svc:5432
    name: grafana_db
    user: admin
    password: admin-db-123
  unified_alerting:
    enabled: true
assertNoLeakedSecrets: false

## Pre-configured Datasources
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      # Prometheus — metrics (Alloy scrapes via remote_write, 7-day retention)
      - name: Prometheus
        uid: prometheus
        type: prometheus
        url: http://kube-prometheus-stack-prometheus.observability:9090/
        access: proxy
        isDefault: true
      # Loki — logs (Alloy ships via loki.write, 7-day retention)
      - name: Loki
        uid: loki
        type: loki
        url: http://loki-gateway.observability:80/
        access: proxy
      # Tempo — traces (Alloy ships via OTLP, 7-day retention)
      - name: Tempo
        uid: tempo
        type: tempo
        url: http://tempo.observability:3100/
        access: proxy
        jsonData:
          tracesToLogs:
            datasourceUid: loki
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true

ingress:
  enabled: false

service:
  type: NodePort
  port: 3000
  nodePort: 30300

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

## Dashboard sidecar
sidecar:
  dashboards:
    enabled: true
    searchNamespace: ALL
    label: grafana_dashboard
  datasources:
    enabled: true
