# =============================================================================
# Uptime Kuma - Helm Values (Demo)
# =============================================================================
# Connected to dedicated MariaDB, using NodePort for UI
# =============================================================================

image:
  repository: louislam/uptime-kuma
  pullPolicy: IfNotPresent
  tag: "2.1.1"

service:
  type: NodePort
  port: 3001
  nodePort: 30400

ingress:
  enabled: false

# External MariaDB database configuration
externalDatabase:
  enabled: false

serviceMonitor:
  enabled: true

volume:
  enabled: true
  accessMode: ReadWriteOnce
  size: 5Gi
  storageClassName: "local-path"

resources:
  requests:
    cpu: 50m
    memory: 500Mi
  limits:
    cpu: 50m
    memory: 1Gi

networkPolicy:
  enabled: false
