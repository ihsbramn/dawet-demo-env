# =============================================================================
# Tempo (Single Binary) - Helm Values (Demo)
# =============================================================================
# Ultra-lightweight tracing for 8GB RAM Mac
# =============================================================================

tempo:
  structuredConfig:
    common:
      storage:
        backend: s3
        s3:
          endpoint: minio.minio-system.svc:9000
          bucket: tempo-data
          access_key_id: minio-admin
          secret_access_key: minio-secret-123
          insecure: true
    storage:
      trace:
        backend: s3

persistence:
  enabled: true
  storageClass: local-path
  size: 2Gi

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Disable extra features
ingester:
  replicas: 1
  resources:
    limits:
      memory: 256Mi

metricsGenerator:
  enabled: false
