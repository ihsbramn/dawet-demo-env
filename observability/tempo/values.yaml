# =============================================================================
# Tempo (Single Binary) - Helm Values (Demo)
# =============================================================================
# Ultra-lightweight tracing for 8GB RAM Mac
# =============================================================================

tempo:
  structuredConfig:
    common:
      storage:
        backend: local
    storage:
      trace:
        backend: local
    # 7-day trace retention
    compactor:
      compaction:
        block_retention: 168h

persistence:
  enabled: true
  storageClass: local-path
  size: 2Gi

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Disable extra features
ingester:
  replicas: 1
  resources:
    limits:
      memory: 256Mi

metricsGenerator:
  enabled: false
