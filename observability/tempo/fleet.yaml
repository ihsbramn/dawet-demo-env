# =============================================================================
# Tempo (Traces) - Fleet Bundle (Demo)
# =============================================================================
# Step 7: Distributed tracing with MinIO backend
# =============================================================================

defaultNamespace: observability

helm:
  repo: https://grafana.github.io/helm-charts/
  chart: tempo-distributed
  version: 1.61.3
  releaseName: tempo
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: loki

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: tempo
