#  =============================================================================
# Tempo (Traces) - Fleet Bundle (Demo)
#  =============================================================================
# Step 10: Single-binary Tempo for ultra-lightweight tracing
#  =============================================================================

defaultNamespace: observability

helm:
 repo: https://grafana.github.io/helm-charts/
 chart: tempo
 version: 1.10.1
 releaseName: tempo
 valuesFiles:
   - values.yaml

dependsOn:
 - selector:
     matchLabels:
       bundle: loki

targetCustomizations:
 - name: dev
   clusterSelector:
     matchLabels:
       env: dev

labels:
 bundle: tempo
