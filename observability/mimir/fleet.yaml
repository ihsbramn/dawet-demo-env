# =============================================================================
# Mimir (Metrics) - Fleet Bundle (Demo)
# =============================================================================

defaultNamespace: observability

helm:
  repo: https://grafana.github.io/helm-charts/
  chart: mimir-distributed
  version: 5.4.0
  releaseName: mimir
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: minio

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: mimir
