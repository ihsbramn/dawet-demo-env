# =============================================================================
# Mimir (Metrics) - Fleet Bundle (Demo)
# =============================================================================
# Step 5: Prometheus-compatible metrics storage
# =============================================================================

defaultNamespace: observability

helm:
  repo: https://grafana.github.io/helm-charts/
  chart: mimir-distributed
  version: 6.0.6
  releaseName: mimir
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: redis

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: mimir
