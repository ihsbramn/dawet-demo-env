#  =============================================================================
# Prometheus (Metrics) - Fleet Bundle (Demo)
#  =============================================================================
# Step 8: Lightweight metrics storage using standard Prometheus
#  =============================================================================

defaultNamespace: observability

helm:
  repo: https://prometheus-community.github.io/helm-charts/
  chart: prometheus
  version: 25.21.0
  releaseName: mimir
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: dify

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: mimir
