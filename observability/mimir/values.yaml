# =============================================================================
# Mimir Distributed - Helm Values (Demo)
# =============================================================================
# Metrics Storage | MinIO Backend | Single replica
# =============================================================================

mimir:
  structuredConfig:
    common:
      storage:
        backend: s3
        s3:
          endpoint: minio.minio-system.svc:9000
          bucket_name: mimir-data
          access_key_id: minio-admin
          secret_access_key: minio-secret-123
          insecure: true
    blocks_storage:
      backend: s3
      s3:
        bucket_name: mimir-data
      tsdb:
        dir: /data/tsdb
    compactor:
      data_dir: /data/compactor
      sharding_ring:
        kvstore:
          store: memberlist
    limits:
      max_global_series_per_user: 150000
      compactor_blocks_retention_period: 168h  # 7 days for demo

distributor:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingester:
  replicas: 1
  persistentVolume:
    enabled: true
    storageClass: local-path
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

querier:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

query_frontend:
  replicas: 1

store_gateway:
  replicas: 1
  persistentVolume:
    enabled: true
    storageClass: local-path
    size: 5Gi

compactor:
  replicas: 1
  persistentVolume:
    enabled: true
    storageClass: local-path
    size: 5Gi

gateway:
  enabledNonEnterprise: true

metaMonitoring:
  serviceMonitor:
    enabled: false
    labels:
      release: grafana
