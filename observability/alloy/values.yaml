# =============================================================================
# Alloy - Helm Values (Demo)
# =============================================================================
# OpenTelemetry Collector DaemonSet
# Pipeline: K8s metrics + logs + OTLP traces
# PII masking enabled
# =============================================================================

alloy:
  configMap:
    content: |
      // ===================== METRICS PIPELINE =====================
      prometheus.scrape "kubernetes_pods" {
        targets = discovery.kubernetes.pods.targets
        forward_to = [prometheus.relabel.pii_mask_metrics.receiver]
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.kubernetes "nodes" {
        role = "node"
      }

      prometheus.scrape "kubernetes_nodes" {
        targets = discovery.kubernetes.nodes.targets
        forward_to = [prometheus.relabel.pii_mask_metrics.receiver]
        scrape_interval = "30s"
      }

      prometheus.relabel "pii_mask_metrics" {
        rule {
          source_labels = ["customer_id"]
          regex = "(.+)"
          target_label = "customer_id"
          replacement = "MASKED"
        }
        rule {
          source_labels = ["account_number"]
          regex = "(.+)"
          target_label = "account_number"
          replacement = "MASKED"
        }
        forward_to = [prometheus.remote_write.prometheus.receiver]
      }

      prometheus.remote_write "prometheus" {
        endpoint {
          url = "http://kube-prometheus-stack-prometheus.observability:9090/api/v1/write"
        }
      }

      // ===================== LOGS PIPELINE =====================
      discovery.relabel "kubernetes_pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_controller_name"]
          regex         = "([0-9a-z-.]+?)(-[0-9a-f]{8,10})?"
          target_label  = "__tmp_controller_name"
        }
        rule {
          source_labels = [
            "__meta_kubernetes_pod_label_app_kubernetes_io_name",
            "__meta_kubernetes_pod_label_app",
            "__tmp_controller_name",
            "__meta_kubernetes_pod_name",
          ]
          regex        = "^;*([^;]+)(;.*)?$"
          target_label = "app"
        }
        rule {
          source_labels = [
            "__meta_kubernetes_pod_label_app_kubernetes_io_instance",
            "__meta_kubernetes_pod_label_instance",
          ]
          regex        = "^;*([^;]+)(;.*)?$"
          target_label = "instance"
        }
        rule {
          source_labels = [
            "__meta_kubernetes_pod_label_app_kubernetes_io_component",
            "__meta_kubernetes_pod_label_component",
          ]
          regex        = "^;*([^;]+)(;.*)?$"
          target_label = "component"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node_name"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["namespace", "app"]
          separator     = "/"
          target_label  = "job"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = [
            "__meta_kubernetes_pod_uid",
            "__meta_kubernetes_pod_container_name",
          ]
          separator     = "/"
          target_label  = "__path__"
          replacement   = "/var/log/pods/*$1/*.log"
        }
        rule {
          source_labels = [
            "__meta_kubernetes_pod_annotationpresent_kubernetes_io_config_hash",
            "__meta_kubernetes_pod_annotation_kubernetes_io_config_hash",
            "__meta_kubernetes_pod_container_name",
          ]
          separator     = "/"
          regex         = "true/(.*)"
          target_label  = "__path__"
          replacement   = "/var/log/pods/*$1/*.log"
        }
      }

      local.file_match "kubernetes_pods" {
        path_targets = discovery.relabel.kubernetes_pods.output
      }

      loki.process "kubernetes_pods" {
        forward_to = [loki.process.pii_mask_logs.receiver]

        stage.cri {}
        stage.decolorize {}

        stage.drop {
          expression = ".*(\\/health|\\/metrics|\\/ping).*"
        }
      }

      loki.source.file "kubernetes_pods" {
        targets               = local.file_match.kubernetes_pods.targets
        forward_to            = [loki.process.kubernetes_pods.receiver]
        legacy_positions_file = "/run/promtail/positions.yaml"
      }

      // ===================== KUBERNETES EVENTS LOGS =====================

      loki.source.kubernetes_events "cluster_events" {
          job_name   = "integrations/kubernetes/eventhandler"
          log_format = "logfmt"
          forward_to = [
              loki.process.cluster_events.receiver,
          ]
      }

      loki.process "cluster_events" {
          forward_to = [loki.write.loki.receiver]

          stage.regex {
              expression = ".*name=(?P<name>[^ ]+).*kind=(?P<kind>[^ ]+).*objectAPIversion=(?P<apiVersion>[^ ]+).*type=(?P<type>[^ ]+).*"
          }

          stage.labels {
              values = {
                  kubernetes_cluster_events = "job",
                  name                      = "name",
                  kind                      = "kind",
                  apiVersion                = "apiVersion",
                  type                      = "type",
              }
          }
      }

      loki.process "pii_mask_logs" {
        stage.replace {
          expression = "(customer_id[\":]\\s*[\"']?)\\d{6,}([\"']?)"
          replace = "${1}MASKED${2}"
        }
        stage.replace {
          expression = "(balance[\":]\\s*[\"']?)\\d+\\.?\\d*([\"']?)"
          replace = "${1}MASKED${2}"
        }
        stage.replace {
          expression = "(account_number[\":]\\s*[\"']?)\\d{8,}([\"']?)"
          replace = "${1}MASKED${2}"
        }
        stage.json {
          expressions = {
            level  = "level",
            msg    = "msg",
          }
        }
        stage.labels {
          values = {
            level = "",
          }
        }
        forward_to = [loki.write.loki.receiver]
      }

      loki.write "loki" {
        endpoint {
          url = "http://loki-gateway.observability:80/loki/api/v1/push"
          tenant_id = "dawet"
        }
        external_labels = {
              cluster  = "uat-allobrain-cluster",
              exporter = "alloy",
        }
      }

      // ===================== TRACES PIPELINE =====================
      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          traces = [otelcol.processor.attributes.pii_mask_traces.input]
        }
      }

      otelcol.processor.attributes "pii_mask_traces" {
        action {
          key = "customer.id"
          action = "update"
          value = "MASKED"
        }
        action {
          key = "account.balance"
          action = "delete"
        }
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.observability:4318"
          tls {
            insecure = true
          }
          headers = {
            "X-Scope-OrgID" = "dawet",
          }
        }
      }

  mounts:
    varlog: true

  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

controller:
  type: daemonset
  tolerations:
    - operator: Exists

service:
  enabled: true
  type: ClusterIP
