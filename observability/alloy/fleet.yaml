#  =============================================================================
# Alloy (OTel Collector) - Fleet Bundle (Demo)
#  =============================================================================
# Step 11: OpenTelemetry collector DaemonSet
#  =============================================================================

defaultNamespace: observability

helm:
  repo: https://grafana.github.io/helm-charts/
  chart: alloy
  version: 1.6.2
  releaseName: alloy
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: tempo

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: alloy
