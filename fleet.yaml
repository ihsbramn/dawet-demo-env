# =============================================================================
# DAWET Fleet Repository - Root Aggregation Config (Demo)
# =============================================================================

defaultNamespace: default

helm:
  releaseName: dawet
  atomic: true
  timeoutSeconds: 600

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev
    helm:
      values:
        global:
          environment: dev
          storageClass: local-path
          domain: dev.dawet.internal
