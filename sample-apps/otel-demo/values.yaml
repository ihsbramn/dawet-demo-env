# =============================================================================
# OpenTelemetry Demo - Helm Values
# =============================================================================
# Generates traces, metrics, and logs for validation
# Routes telemetry to Alloy collector
# =============================================================================

default:
  env:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://alloy.observability.svc:4317"
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: "grpc"
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi

## Disable built-in collectors (using Alloy instead)
opentelemetry-collector:
  enabled: false

## Disable built-in backends (using our LGTM stack)
jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false

# Disable extra non-demo features
featureFlags:
  enabled: false
kafka:
  enabled: false

## Enable frontend for testing
components:
  frontend:
    enabled: true
    service:
      type: NodePort
      port: 8080
      nodePort: 30800

  ## Limit all other services
  adService:
    enabled: true
  cartService:
    enabled: true
  checkoutService:
    enabled: true
  currencyService:
    enabled: true
  emailService:
    enabled: true
  paymentService:
    enabled: true
  productCatalogService:
    enabled: true
  recommendationService:
    enabled: true
  shippingService:
    enabled: true
  loadgenerator:
    enabled: true
