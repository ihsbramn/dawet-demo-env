# =============================================================================
# OpenTelemetry Demo - Helm Values (v0.105.0)
# =============================================================================
# Updated to modern chart structure with external Alloy collector
# Ref: https://opentelemetry.io/docs/platforms/kubernetes/helm/demo/
# =============================================================================

default:
  # native chart settings for external collector
  otlpCollectorEndpoint: http://alloy.observability:4317
  otlpCollectorProtocol: grpc
  env:
    - name: OTEL_SERVICE_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: metadata.labels['app.kubernetes.io/component']

## Disable built-in collectors (using Alloy instead) 
opentelemetry-collector:
  enabled: false

## Disable built-in backends (using our LGTM stack)
jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
opensearch:
  enabled: false

## Component configuration (Updated to 0.105.0 naming convention)
components:
  frontend:
    enabled: true
    service:
      type: NodePort
      port: 8080
      nodePort: 30800
  adservice:
    enabled: true
  cartservice:
    enabled: true
  checkoutservice:
    enabled: true
  currencyservice:
    enabled: true
  emailservice:
    enabled: true
  paymentservice:
    enabled: true
  productcatalogservice:
    enabled: true
  productreviewservice: # Added as requested (Product Review)
    enabled: true
  recommendationservice: # (Recommendation)
    enabled: true
  shippingservice:
    enabled: true
  loadgenerator: # (Load Generator)
    enabled: true
    service:
      type: NodePort
      port: 8089
      nodePort: 30889
  frauddetectionservice:
    enabled: true
  quoteservice:
    enabled: true
  imageprovider: # Added as requested (Image Provider)
    enabled: true
  llmservice:
    enabled: true
  postgresql:
    enabled: true
  kafka:
    enabled: true
  valkey:
    enabled: true
