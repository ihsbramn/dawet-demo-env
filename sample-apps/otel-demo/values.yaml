# =============================================================================
# OpenTelemetry Demo - Helm Values (v0.40.6)
# =============================================================================

default:
  env:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://alloy.observability.svc:4317"
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: "grpc"

## Disable built-in collectors (using Alloy instead)
opentelemetry-collector:
  enabled: false

## Disable built-in backends (using our LGTM stack)
jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
opensearch:
  enabled: false

## Component configuration (correcting snake_case/kebab-case)
components:
  frontend:
    enabled: true
    service:
      type: NodePort
      port: 8080
      nodePort: 30800
  adservice:
    enabled: true
  cartservice:
    enabled: true
  checkoutservice:
    enabled: true
  currencyservice:
    enabled: true
  emailservice:
    enabled: true
  paymentservice:
    enabled: true
  productcatalogservice:
    enabled: true
  recommendation:
    enabled: true
  shippingservice:
    enabled: true
  load-generator:
    enabled: true
