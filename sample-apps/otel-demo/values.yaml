# =============================================================================
# OpenTelemetry Demo - Helm Values (v0.40.6)
# =============================================================================

default:
  env:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://alloy.observability.svc:4317"
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: "grpc"

## Disable built-in collectors (using Alloy instead)
opentelemetry-collector:
  enabled: false

## Disable built-in backends (using our LGTM stack)
jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
opensearch:
  enabled: false

## Component configuration (Back under components, using SHORT NAMES)
components:
  frontend:
    enabled: true
    service:
      type: NodePort
      port: 8080
      nodePort: 30800
  ad:
    enabled: true
  cart:
    enabled: true
  checkout:
    enabled: true
  currency:
    enabled: true
  email:
    enabled: true
  payment:
    enabled: true
  product-catalog:
    enabled: true
  recommendation:
    enabled: true
  shipping:
    enabled: true
  load-generator:
    enabled: true
  fraud-detection:
    enabled: true
  quote:
    enabled: true
  image-provider:
    enabled: true
  llm:
    enabled: true
  postgresql:
    enabled: true
  kafka:
    enabled: true
  valkey-cart:
    enabled: true
