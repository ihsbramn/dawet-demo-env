# =============================================================================
# OpenTelemetry Demo - Fleet Bundle (Demo)
# =============================================================================
# Step 15: Sample app that generates traces/metrics/logs
# =============================================================================

defaultNamespace: sample-apps

helm:
  repo: https://open-telemetry.github.io/opentelemetry-helm-charts/
  chart: opentelemetry-demo
  version: 0.40.6
  releaseName: otel-demo
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: resource-quotas

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: otel-demo
