# =============================================================================
# Network Policy: AI Workflow Namespace
# =============================================================================
# CRITICAL: Block all egress to public internet for AI workloads
# Day 3 Mod 2: No traffic to Public GPT endpoints
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-workflow-default-deny
  namespace: ai-workflow
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # Allow traffic to internal services only
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: minio-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgres-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: redis-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-workflow
---
# Allow internal AI workflow inter-component communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-workflow-allow-internal
  namespace: ai-workflow
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-workflow
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
---
# Allow n8n webhook traffic from ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: n8n-allow-webhook
  namespace: ai-workflow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: n8n
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5678
