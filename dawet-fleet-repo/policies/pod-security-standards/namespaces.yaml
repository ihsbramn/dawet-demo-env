# =============================================================================
# Pod Security Standards - Namespace Labels
# =============================================================================
# Enforce Kubernetes Pod Security Standards (PSS) via namespace labels
# OJK Compliance: Restricted profile for production workloads
# =============================================================================

## Observability - Baseline (Alloy needs hostPath for logs)
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
## AI Workflow - Restricted (strictest security)
apiVersion: v1
kind: Namespace
metadata:
  name: ai-workflow
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
