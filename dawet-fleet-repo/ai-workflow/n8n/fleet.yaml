# =============================================================================
# n8n Workflow Automation - Fleet Bundle (Demo)
# =============================================================================

defaultNamespace: ai-workflow

helm:
  repo: https://8gears.container-registry.com/chartrepo/library
  chart: n8n
  version: 0.25.0
  releaseName: n8n
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: postgres-cluster
  - selector:
      matchLabels:
        bundle: redis

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: n8n
