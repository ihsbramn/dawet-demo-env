# =============================================================================
# Dify - Helm Values (Demo)
# =============================================================================
# RAG & LLM Ops | Internal LLM Only | Single replica
# =============================================================================

api:
  replicas: 1
  image:
    repository: langgenius/dify-api
    tag: "0.8.0"
  env:
    - name: DB_USERNAME
      value: "dify"
    - name: DB_PASSWORD
      value: "dify-db-123"
    - name: DB_HOST
      value: "postgres-grafana-postgresql.postgres-system.svc"
    - name: DB_PORT
      value: "5432"
    - name: DB_DATABASE
      value: "dify_db"
    - name: REDIS_HOST
      value: "redis-master.redis-system.svc"
    - name: REDIS_PORT
      value: "6379"
    - name: REDIS_PASSWORD
      value: "redis-demo-123"
    - name: STORAGE_TYPE
      value: "s3"
    - name: S3_ENDPOINT
      value: "http://minio.minio-system.svc:9000"
    - name: S3_BUCKET_NAME
      value: "dify-files"
    - name: S3_ACCESS_KEY
      value: "minio-admin"
    - name: S3_SECRET_KEY
      value: "minio-secret-123"
    - name: S3_USE_PATH_STYLE
      value: "true"
    - name: VECTOR_STORE
      value: "milvus"
    - name: MILVUS_HOST
      value: "milvus.ai-workflow.svc"
    - name: MILVUS_PORT
      value: "19530"
    # Internal LLM only - no public GPT
    - name: OPENAI_API_BASE
      value: "http://vllm.ai-workflow.svc:8000/v1"
    - name: OPENAI_API_KEY
      value: "not-needed-for-local"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

worker:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

web:
  replicas: 1
  image:
    repository: langgenius/dify-web
    tag: "0.8.0"

ingress:
  enabled: false

## NodePort access for demo
service:
  type: NodePort
  api:
    port: 5001
    nodePort: 30500
  web:
    port: 3000
    nodePort: 30501
