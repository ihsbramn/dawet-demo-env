# =============================================================================
# PostgreSQL - Grafana Database (Demo)
# =============================================================================
global:
  postgresql:
    auth:
      postgresPassword: postgres-admin-123
      username: grafana
      password: grafana-db-123
      database: grafana_db

primary:
  persistence:
    enabled: true
    storageClass: local-path
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  initdb:
    scripts:
      init.sql: |
        CREATE DATABASE grafana_db;
        GRANT ALL PRIVILEGES ON DATABASE grafana_db TO grafana;

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    labels:
      release: grafana
