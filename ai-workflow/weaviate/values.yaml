# =============================================================================
# Weaviate - Helm Values (Demo - Minimal)
# =============================================================================

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  size: 2Gi
  storageClassName: local-path

# Disable heavy modules for demo
modules:
  text2vec-openai:
    enabled: false
  text2vec-cohere:
    enabled: false
  text2vec-huggingface:
    enabled: false
  generative-openai:
    enabled: false

# Authentication / Authorization
authentication:
  anonymous_access:
    enabled: true
