#  =============================================================================
# Weaviate Vector DB - Fleet Bundle (Demo)
#  =============================================================================
# Step 5: Lightweight Vector DB for Dify RAG
#  =============================================================================

defaultNamespace: ai-workflow

helm:
  repo: https://weaviate.github.io/weaviate-helm/
  chart: weaviate
  version: 16.3.0
  releaseName: weaviate
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: redis

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: weaviate
