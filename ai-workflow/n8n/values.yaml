# =============================================================================
# n8n - Helm (8gears) Values (Demo)
# =============================================================================

main:
  count: 1
  extraEnvVars:
    - name: DB_TYPE
      value: "postgresdb"
    - name: DB_POSTGRESDB_HOST
      value: "postgres-grafana-postgresql.postgres-system.svc"
    - name: DB_POSTGRESDB_PORT
      value: "5432"
    - name: DB_POSTGRESDB_USER
      value: "admin"
    - name: DB_POSTGRESDB_DATABASE
      value: "n8n_db"
    - name: DB_POSTGRESDB_PASSWORD
      value: "admin-db-123"
    - name: WEBHOOK_URL
      value: "https://n8n.dev.dawet.internal"
    - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
      value: "false"
  
  persistence:
    enabled: true
    storageClass: hostpath
    size: 2Gi

service:
  type: NodePort
  port: 5678
  nodePort: 30520

# Root labels NOT allowed by schema - removed.
