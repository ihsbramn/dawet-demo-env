# =============================================================================
# n8n - Helm (8gears) Values (Demo)
# =============================================================================

main:
  count: 1
  extraEnvVars:
    DB_TYPE: "postgresdb"
    DB_POSTGRESDB_HOST: "postgres-grafana-postgresql.postgres-system.svc"
    DB_POSTGRESDB_PORT: "5432"
    DB_POSTGRESDB_USER: "admin"
    DB_POSTGRESDB_DATABASE: "n8n_db"
    DB_POSTGRESDB_PASSWORD: "admin-db-123"
    WEBHOOK_URL: "https://n8n.dev.dawet.internal"
    N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
  
  persistence:
    enabled: true
    storageClass: local-path
    size: 2Gi

service:
  type: NodePort
  port: 5678
  # nodePort removed to avoid schema validation errors
