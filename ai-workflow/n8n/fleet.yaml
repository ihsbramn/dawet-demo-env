# =============================================================================
# n8n Workflow Automation - Fleet Bundle (Demo)
# =============================================================================

defaultNamespace: ai-workflow

helm:
  repo: https://community-charts.github.io/helm-charts/
  chart: n8n
  version: 1.16.34
  releaseName: n8n
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: postgres-cluster
  - selector:
      matchLabels:
        bundle: redis

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: n8n
