#  =============================================================================
# Milvus Vector DB - Fleet Bundle (Demo)
#  =============================================================================
# Step 5: Vector DB for Dify RAG (after redis)
#  =============================================================================

defaultNamespace: ai-workflow

helm:
 repo: https://zilliztech.github.io/milvus-helm/
 chart: milvus
 version: 5.0.16
 releaseName: milvus
 valuesFiles:
   - values.yaml

dependsOn:
 - selector:
     matchLabels:
       bundle: redis

targetCustomizations:
 - name: dev
   clusterSelector:
     matchLabels:
       env: dev

labels:
 bundle: milvus
