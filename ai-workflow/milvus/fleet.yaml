# =============================================================================
# Milvus Vector DB - Fleet Bundle (Demo)
# =============================================================================
# Step 10: Vector DB for Dify RAG
# =============================================================================

defaultNamespace: ai-workflow

helm:
  repo: https://zilliztech.github.io/milvus-helm/
  chart: milvus
  version: 4.2.0
  releaseName: milvus
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: grafana

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: milvus
