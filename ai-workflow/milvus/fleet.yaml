# =============================================================================
# Milvus Vector DB - Fleet Bundle (Demo)
# =============================================================================

defaultNamespace: ai-workflow

helm:
  repo: https://zilliztech.github.io/milvus-helm
  chart: milvus
  version: 4.2.0
  releaseName: milvus
  valuesFiles:
    - values.yaml

dependsOn:
  - selector:
      matchLabels:
        bundle: minio
  - selector:
      matchLabels:
        bundle: postgres-cluster
  - selector:
      matchLabels:
        bundle: redis

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: milvus
