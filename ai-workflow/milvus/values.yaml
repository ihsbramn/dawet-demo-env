# =============================================================================
# Milvus - Helm Values (Demo)
# =============================================================================
# Vector DB | Standalone Mode | External MinIO & Postgres
# =============================================================================

cluster:
  enabled: false

standalone:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

etcd:
  enabled: true
  replicaCount: 1
  persistence:
    enabled: true
    storageClass: hostpath
    size: 2Gi

minio:
  enabled: false

externalS3:
  enabled: true
  host: minio.minio-system.svc
  port: 9000
  accessKey: minio-admin
  secretKey: minio-secret-123
  bucketName: milvus-data
  useSSL: false

postgresql:
  enabled: false

externalPostgresql:
  enabled: true
  host: postgres-grafana-postgresql.postgres-system.svc
  port: 5432
  user: admin
  password: admin-db-123
  database: milvus_meta

log:
  level: info
  format: json

metrics:
  enabled: true
  serviceMonitor:
    enabled: false
    labels:
      release: grafana

service:
  type: ClusterIP
  port: 19530

persistence:
  enabled: true
  storageClass: hostpath
  size: 10Gi
