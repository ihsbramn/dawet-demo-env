defaultNamespace: ai-workflow

helm:
  repo: https://borispolonsky.github.io/dify-helm/
  chart: dify
  version: 0.36.0
  releaseName: dify
  valuesFiles:
    - values.yaml

targetCustomizations:
  - name: dev
    clusterSelector:
      matchLabels:
        env: dev

labels:
  bundle: dify
