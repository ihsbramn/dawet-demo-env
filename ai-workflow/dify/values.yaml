# =============================================================================
# Dify - Helm Values (Demo)
# =============================================================================

api:
  replicas: 1
  image:
    tag: "0.8.0"
  env:
    - name: DB_USERNAME
      value: "admin"
    - name: DB_PASSWORD
      value: "admin-db-123"
    - name: DB_HOST
      value: "postgres-grafana-postgresql.postgres-system.svc"
    - name: DB_PORT
      value: "5432"
    - name: DB_DATABASE
      value: "dify_db"
    - name: REDIS_HOST
      value: "redis-master.redis-system.svc"
    - name: REDIS_PORT
      value: "6379"
    - name: REDIS_PASSWORD
      value: "redis-demo-123"
    - name: STORAGE_TYPE
      value: "local"
    - name: STORAGE_LOCAL_PATH
      value: "/app/api/storage"
    - name: VECTOR_STORE
      value: "weaviate"
    - name: WEAVIATE_HOST
      value: "weaviate.ai-workflow.svc"
    - name: WEAVIATE_PORT
      value: "8080"

# Satisfy subchart secret templates even if enabled: false
# Dify chart uses 'postgresql.auth.password' or 'postgresql.postgresql.auth.password'
postgresql:
  enabled: true
  auth:
    database: "dify_db"
    username: "admin"
    password: "admin-db-123"
    postgresPassword: "admin-db-123"

redis:
  enabled: true
  auth:
    password: "redis-demo-123"

worker:
  replicas: 1
web:
  replicas: 1

service:
  type: NodePort
  api:
    nodePort: 30500
  web:
    nodePort: 30501
