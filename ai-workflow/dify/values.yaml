# =============================================================================
# Dify - Helm Values (Demo)
# =============================================================================
# RAG & LLM Ops | Internal LLM Only | Single replica
# =============================================================================

api:
  replicas: 1
  image:
    repository: langgenius/dify-api
    tag: "0.8.0"
  env:
    - name: DB_USERNAME
      value: "admin"
    - name: DB_PASSWORD
      value: "admin-db-123"
    - name: DB_HOST
      value: "postgres-grafana-postgresql.postgres-system.svc"
    - name: DB_PORT
      value: "5432"
    - name: DB_DATABASE
      value: "dify_db"
    - name: REDIS_HOST
      value: "redis-master.redis-system.svc"
    - name: REDIS_PORT
      value: "6379"
    - name: REDIS_PASSWORD
      value: "redis-demo-123"
    - name: STORAGE_TYPE
      value: "local"
    - name: STORAGE_LOCAL_PATH
      value: "/app/api/storage"
    - name: VECTOR_STORE
      value: "weaviate"
    - name: WEAVIATE_HOST
      value: "weaviate.ai-workflow.svc"
    - name: WEAVIATE_PORT
      value: "8080"
    # Internal LLM only - no public GPT
    - name: OPENAI_API_BASE
      value: "http://vllm.ai-workflow.svc:8000/v1"
    - name: OPENAI_API_KEY
      value: "not-needed-for-local"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

web:
  replicas: 1
  image:
    repository: langgenius/dify-web
    tag: "0.8.0"

ingress:
  enabled: false

## NodePort access for demo
service:
  type: NodePort
  api:
    port: 5001
    nodePort: 30500
  web:
    port: 3000
    nodePort: 30501
