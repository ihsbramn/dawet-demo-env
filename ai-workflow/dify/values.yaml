# =============================================================================
# Dify - BorisPolonsky/dify-helm Values (Demo)
# =============================================================================

global:
  edition: "SELF_HOSTED"
  appSecretKey: "dify-demo-app-secret-1234567890-xyz"

api:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  persistence:
    enabled: true
    storageClass: hostpath
    accessModes: ReadWriteMany
    size: 2Gi
  
  service:
    port: 5001

web:
  enabled: true
  replicas: 1
  service:
    port: 3000

worker:
  enabled: true
  replicas: 1

sandbox:
  enabled: true
  replicas: 1

## =============================================================================
## Internal Infrastructure Bundles (Self-contained)
## =============================================================================

# Using Chart Defaults for Database/Redis Connection
externalPostgres:
  enabled: false
externalRedis:
  enabled: false
externalWeaviate:
  enabled: false

## Enable internal subcharts with hostpath storage
postgresql:
  enabled: true
  fullnameOverride: "dify-postgres"
  primary:
    persistence:
      enabled: true
      storageClass: hostpath
      size: 2Gi

redis:
  enabled: true
  fullnameOverride: "dify-redis"
  master:
    persistence:
      enabled: true
      storageClass: hostpath
      size: 2Gi

weaviate:
  enabled: true
  fullnameOverride: "dify-weaviate"
  storage:
    storageClassName: hostpath
    size: 2Gi

ssrfProxy:
  enabled: false

## Enable NodePort for outside access
proxy:
  enabled: true
  service:
    type: NodePort
    http:
      nodePort: 30500
    https:
      nodePort: 30501
