# =============================================================================
# Dify - BorisPolonsky/dify-helm Values (Demo)
# =============================================================================

global:
  edition: "SELF_HOSTED"
  appSecretKey: "dify-demo-app-secret-1234567890-xyz"

api:
  enabled: true
  replicas: 1
  image:
    repository: "langgenius/dify-api"
    tag: "1.12.1"
    pullPolicy: Always
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  persistence:
    enabled: true
    mountPath: "/app/api/storage"
    persistentVolumeClaim:
      storageClass: local-path
      accessModes: "ReadWriteOnce"
      size: 5Gi
  
  service:
    port: 5001

web:
  enabled: true
  replicas: 1
  image:
    repository: "langgenius/dify-web"
    tag: "1.12.1"
    pullPolicy: Always
  service:
    port: 3000

service:
  type: NodePort
  port: 80
  NodePort: 30501

worker:
  enabled: true
  replicas: 1
  image:
    repository: "langgenius/dify-api"
    tag: "1.12.1"
    pullPolicy: Always

sandbox:
  enabled: true
  replicas: 1
  image:
    repository: "langgenius/dify-sandbox"
    tag: "0.2.12"
    pullPolicy: Always

pluginDaemon:
  enabled: true
  image:
    repository: "langgenius/dify-plugin-daemon"
    tag: "0.5.3-local"
    pullPolicy: Always
  persistence:
    enabled: true
    mountPath: "/app/storage"
    persistentVolumeClaim:
      storageClass: local-path
      accessModes: "ReadWriteOnce"
      size: 5Gi

## =============================================================================
## Internal Infrastructure Bundles (Self-contained)
## =============================================================================

postgresql:
  enabled: true
  fullnameOverride: "dify-db-v5" # Bump v5 to avoid PVC claim errors
  architecture: standalone
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 2Gi
  global:
    storageClass: local-path
  auth:
    database: "dify_db"
    username: "admin"
    password: "admin-db-123"
    postgresPassword: "admin-db-123"
    replicationPassword: "admin-db-123"

redis:
  enabled: true
  fullnameOverride: "dify-redis-v5"
  master:
    persistence:
      enabled: true
      storageClass: local-path
      size: 2Gi
  global:
    storageClass: local-path

weaviate:
  enabled: true
  fullnameOverride: "dify-weaviate-v5"
  storage:
    storageClassName: local-path
    size: 2Gi

ssrfProxy:
  enabled: false

## Enable NodePort for outside access
proxy:
  enabled: true
  service:
    type: NodePort
    http:
      nodePort: 30500
    https:
      nodePort: 30501
